[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ---------------------------------------------------------------------------
# Security headers (applied to every response)
# ---------------------------------------------------------------------------
# The CSP starts in Report-Only mode on purpose: it won't block anything yet,
# it just reports what *would* be blocked. Watch reports for a couple of
# weeks (wire up a collector via report-to/report-uri, or check browser
# devtools console on a few real visits), adjust the sources below for
# anything legitimate that gets flagged, then rename the header to
# `Content-Security-Policy` to actually enforce it. See TODO.md.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = """
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      font-src 'self';
      frame-src https://www.google.com;
      connect-src 'self' https://plausible.io https://www.googletagmanager.com https://www.google-analytics.com;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      frame-ancestors 'self';
      upgrade-insecure-requests;
    """

# ---------------------------------------------------------------------------
# Caching
# ---------------------------------------------------------------------------
# Hashed build assets (filenames include a content hash) can be cached
# forever — a content change always produces a new filename.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML pages: always revalidate so content edits (menu, hours, deals) go
# live immediately without a stale cached copy.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
